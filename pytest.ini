[pytest]
# Repo-root test config (added at integration). The backend streams use two async
# styles: WS5 relies on pytest-asyncio in `auto` mode (bare `async def` tests), while
# WS4 uses anyio-marked tests. `auto` mode lets a full-repo `pytest backend/` run
# recognize the bare async tests; anyio-marked tests are still handled by the anyio
# plugin. Per-stream pytest.ini files (e.g. backend/security/pytest.ini) are only
# picked up when a stream is run in isolation.
asyncio_mode = auto
